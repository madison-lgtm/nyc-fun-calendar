name: Update events

on:
  workflow_dispatch:
  schedule:
    # 7:00 AM and 3:30 PM New York time during daylight saving time.
    # GitHub schedules are UTC.
    - cron: "0 11 * * *"
    - cron: "30 19 * * *"

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update events.json
        run: node scripts/update-events.mjs

      - name: Commit updated events
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update NYC event data"
          file_pattern: events.json
